name: Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      MONGO_URI: ${{ secrets.MONGO_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: 1d
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      # ── 1. Clonar repo ──
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Node ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Dependencias ──
      - name: Instalar dependencias
        run: npm ci

      # ── 4. Tests Jest ──
      - name: Ejecutar tests (Jest)
        run: npm test -- --ci --coverage

      # ── 5. Subir coverage ──
      - name: Subir cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # ── 6. Instalar k6 (FORMA PRO) ──
      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # ── 7. Levantar servidor ──
      - name: Levantar servidor
        run: |
          NODE_ENV=production npm run start > server.log 2>&1 &
          echo $! > server.pid

      # ── 8. Esperar servidor ──
      - name: Esperar servidor
        run: |
          TIMEOUT=40
          COUNTER=0

          until curl -s http://localhost:3000/ > /dev/null; do
            if [ $COUNTER -ge $TIMEOUT ]; then
              echo "❌ Timeout: el servidor no levantó"
              echo "------ LOGS ------"
              cat server.log
              exit 1
            fi

            echo "Esperando servidor... ($COUNTER/$TIMEOUT)"
            sleep 1
            COUNTER=$((COUNTER + 1))
          done

          echo "✅ Servidor listo!"

      # ── 9. Test de carga ──
      - name: k6 load test
        run: k6 run src/__tests__/load.test.js

      # ── 10. Apagar servidor ──
      - name: Apagar servidor
        if: always()
        run: |
          kill $(cat server.pid) 2>/dev/null || true