name: Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      MONGO_URI: ${{ secrets.MONGO_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: 1d
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      # ── 1. Tests de integración Jest (.ts) ──
      - name: Jest tests
        run: npm test -- --ci --coverage

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # ── 2. Levantar servidor para k6 ──
      - name: Levantar servidor en background
        run: |
          npm run start:dev > server.log 2>&1 &
          echo $! > server.pid
          echo "Servidor iniciado con PID $(cat server.pid)"

      - name: Esperar a que el servidor esté listo
        run: |
          TIMEOUT=30
          COUNTER=0
          until curl -s http://localhost:3000/ > /dev/null; do
            if [ $COUNTER -ge $TIMEOUT ]; then
              echo "❌ Timeout: el servidor no levantó en ${TIMEOUT}s"
              echo "── server.log ──"
              cat server.log
              exit 1
            fi
            echo "Esperando servidor... ($COUNTER/${TIMEOUT}s)"
            sleep 1
            COUNTER=$((COUNTER + 1))
          done
          echo "✅ Servidor listo!"

      # ── 3. Tests de carga k6 (.js) ──
      - name: k6 load test
        run: k6 run src/__tests__/load.test.js

      - name: Apagar servidor
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true