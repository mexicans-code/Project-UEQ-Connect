name: Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      MONGO_URI: ${{ secrets.MONGO_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: 1d
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # ── 1. Tests Jest ──
      - name: Jest tests
        run: npm test -- --ci --coverage

      - name: Subir cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # ── 2. Instalar k6 ──
      - name: Instalar k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      # ── 3. Levantar servidor ──
      - name: Levantar servidor en background
        run: |
          NODE_ENV=production npm run start > server.log 2>&1 &
          echo $! > server.pid

      # ── 4. Esperar servidor ──
      - name: Esperar servidor
        run: |
          TIMEOUT=40
          COUNTER=0

          until curl -s http://localhost:3000/ > /dev/null; do
            if [ $COUNTER -ge $TIMEOUT ]; then
              echo "❌ Timeout: servidor no levantó"
              echo "------ LOGS ------"
              cat server.log
              exit 1
            fi

            echo "Esperando servidor... ($COUNTER/$TIMEOUT)"
            sleep 1
            COUNTER=$((COUNTER + 1))
          done

          echo "✅ Servidor listo!"

      # ── 5. Test de carga ──
      - name: k6 load test
        run: k6 run src/__tests__/load.test.js

      # ── 6. Apagar servidor ──
      - name: Apagar servidor
        if: always()
        run: |
          kill $(cat server.pid) 2>/dev/null || true